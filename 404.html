<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Plate Lunch Digest</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Fraunces:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --deep: #0D1B2A;
      --navy: #1B263B;
      --slate: #415A77;
      --steel: #778DA9;
      --cloud: #E0E1DD;
      --white: #FFFFFF;
      --coral: #FF6B6B;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: var(--deep);
      color: var(--cloud);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px;
    }
    
    nav {
      padding: 24px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    
    .nav-inner {
      display: flex;
      justify-content: center;
    }
    
    .logo {
      font-family: 'Fraunces', serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--white);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .logo em {
      font-style: italic;
      color: var(--steel);
    }
    
    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--slate), var(--steel));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      text-align: center;
    }
    
    .error-content {
      max-width: 500px;
    }
    
    .error-emoji {
      font-size: 80px;
      margin-bottom: 24px;
    }
    
    h1 {
      font-family: 'Fraunces', serif;
      font-size: 48px;
      font-weight: 600;
      color: var(--white);
      margin-bottom: 16px;
    }
    
    p {
      font-size: 18px;
      color: var(--steel);
      margin-bottom: 32px;
    }
    
    .back-btn {
      display: inline-block;
      padding: 16px 32px;
      background: var(--white);
      color: var(--deep);
      text-decoration: none;
      font-weight: 600;
      border-radius: 100px;
      transition: all 0.3s ease;
    }
    
    .back-btn:hover {
      background: var(--coral);
      color: var(--white);
      transform: translateY(-2px);
    }
    
    footer {
      padding: 24px 0;
      text-align: center;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    
    footer p {
      font-size: 14px;
      color: var(--slate);
      margin: 0;
    }
  </style>
</head>
<body>
  <nav>
    <div class="container nav-inner">
      <a href="/" class="logo">
        <span class="logo-icon">🍱</span>
        <span class="logo-text">Plate Lunch <em>Digest</em></span>
      </a>
    </div>
  </nav>
  
  <main>
    <div class="error-content">
      <div class="error-emoji">🏝️</div>
      <h1>Lost at sea</h1>
      <p>The page you're looking for doesn't exist. Maybe it drifted away, or maybe it was never here to begin with.</p>
      <a href="/" class="back-btn">Back to shore</a>
    </div>
  </main>
  
  <footer>
    <div class="container">
      <p>© 2026 Plate Lunch Digest. Made with aloha in Upcountry Maui, Hawaii.</p>
    </div>
  </footer>
</body>
</html>
